  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0d1117;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e6edf3;
      overflow: hidden;
    }

    /* ══════════════════════════════════════════
       SPLASH
    ══════════════════════════════════════════ */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1rem, 3vh, 2.5rem);
      /* sai suavemente */
      animation: splash-sai 0.7s cubic-bezier(0.4, 0, 0.2, 1) 3.1s both;
    }

    @keyframes splash-sai {
      to { opacity: 0; visibility: hidden; }
    }

    /* ── Letras ─────────────────────────────── */
    .splash-letras {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Logo que surge no centro após as letras se encontrarem ── */
    .sp-logo-quadro {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.5);
      z-index: 10;
      opacity: 0;
      animation: logo-revela 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1.05s forwards;
    }

    @keyframes logo-revela {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1);   }
    }

    .sp-logo-quadro img {
      width:  clamp(110px, 22vmin, 190px);
      height: clamp(110px, 22vmin, 190px);
      border-radius: 28px;
      display: block;
      box-shadow:
        0 0 0 4px rgba(88,166,255,0.25),
        0 0 40px 8px rgba(30,100,220,0.35),
        0 12px 40px rgba(0,0,0,0.6);
    }

    /* RJ — nasce fora à DIREITA e desliza para a esquerda */
    .sp-r {
      font: 900 italic clamp(90px, 20vmin, 170px)/1
            'Arial Black', 'Franklin Gothic Heavy', Impact, Arial, sans-serif;
      color: #0d2545;
      text-shadow:
        2px  3px  0   #091a35,
        4px  6px  10px rgba(0,0,0,0.7),
        0    0    35px rgba(10,50,110,0.35);
      position: relative;
      z-index: 2;
      letter-spacing: -0.04em;
      animation: r-entra 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
    }

    @keyframes r-entra {
      from {
        transform: translateX(min(55vw, 480px));
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* SS — nasce fora à ESQUERDA e desliza para a direita */
    .sp-ss {
      font: 900 italic clamp(90px, 20vmin, 170px)/1
            'Arial Black', 'Franklin Gothic Heavy', Impact, Arial, sans-serif;
      color: #1060b8;
      text-shadow:
        2px  3px  0   #0a4a90,
        4px  6px  10px rgba(0,0,0,0.7),
        0    0    35px rgba(16,100,200,0.35);
      position: relative;
      z-index: 3;            /* SS fica na frente de R no cruzamento */
      margin-left: -0.15em;  /* sobreposição final das letras */
      animation: ss-entra 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.45s both;
    }

    @keyframes ss-entra {
      from {
        transform: translateX(max(-55vw, -480px));
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* ── Seta diagonal (SVG fixed, cobre a tela toda) ─ */
    #seta-overlay {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 1001;
      /* sai junto com o splash */
      animation: splash-sai 0.7s cubic-bezier(0.4, 0, 0.2, 1) 3.1s both;
    }

    /* Corpo da seta: desenha de baixo-esquerda para cima-direita */
    #seta-corpo {
      stroke-dasharray: 820;
      stroke-dashoffset: 820;
      animation: seta-risca 0.8s cubic-bezier(0.4, 0, 0.2, 1) 1.25s forwards;
    }

    @keyframes seta-risca {
      to { stroke-dashoffset: 0; }
    }

    /* Ponta da seta: aparece quando o corpo chega ao topo */
    #seta-ponta {
      opacity: 0;
      transform-origin: 800px 95px;
      animation: ponta-aparece 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) 2.0s forwards;
    }

    @keyframes ponta-aparece {
      from { opacity: 0; transform: scale(0.2); }
      to   { opacity: 1; transform: scale(1);   }
    }

    /* Glow na ponta quando a seta termina */
    #seta-glow {
      opacity: 0;
      animation: glow-aparece 0.6s ease 2.0s forwards;
    }

    @keyframes glow-aparece {
      0%   { opacity: 0; }
      40%  { opacity: 0.9; }
      100% { opacity: 0.5; }
    }

    /* ── Tagline ──────────────────────────────── */
    .splash-tagline {
      font-size: clamp(0.6rem, 1.4vw, 0.82rem);
      color: #1e4a80;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      animation: tagline-entra 0.55s ease 2.2s forwards;
    }

    @keyframes tagline-entra {
      from { opacity: 0; transform: translateY(8px); letter-spacing: 0.5em; }
      to   { opacity: 1; transform: translateY(0);   letter-spacing: 0.3em; color: #4a90d9; }
    }

    /* ══════════════════════════════════════════
       FUNDO (sutil, permanente)
    ══════════════════════════════════════════ */
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-glow::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(88,166,255,0.05), transparent 65%);
      top: -200px; left: -100px;
      animation: bg-pulsa 10s ease-in-out infinite;
    }

    .bg-glow::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(35,134,54,0.04), transparent 65%);
      bottom: -150px; right: -100px;
      animation: bg-pulsa 10s ease-in-out 5s infinite;
    }

    @keyframes bg-pulsa {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%       { transform: scale(1.1); opacity: 0.6; }
    }

    /* ══════════════════════════════════════════
       LOGIN CARD
    ══════════════════════════════════════════ */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      padding: 2rem;
      overflow: auto;
    }

    .card {
      background: rgba(22, 27, 34, 0.96);
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 2.5rem 2rem 2rem;
      width: 100%;
      max-width: 370px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.6),
        0  0   0 1px rgba(88,166,255,0.07);
      /* entra após o splash */
      animation: card-entra 0.6s cubic-bezier(0.22, 1, 0.36, 1) 3.3s both;
    }

    @keyframes card-entra {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .logo-login {
      width: 76px;
      height: 76px;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .card h1 {
      text-align: center;
      font-size: 1.2rem;
      margin-bottom: 0.3rem;
      color: #58a6ff;
      letter-spacing: 0.03em;
    }

    .subtitle {
      text-align: center;
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 1.6rem;
    }

    .alerta {
      background: rgba(248,81,73,0.15);
      border: 1px solid #f85149;
      border-radius: 6px;
      padding: 0.55rem 0.9rem;
      font-size: 0.83rem;
      color: #f85149;
      margin-bottom: 1.2rem;
      text-align: center;
    }

    .form-group { margin-bottom: 1.1rem; }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      color: #8b949e;
      margin-bottom: 0.4rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88,166,255,0.12);
    }

    .btn-login {
      width: 100%;
      padding: 0.72rem;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.4rem;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    }

    .btn-login:hover {
      background: #2ea043;
      box-shadow: 0 4px 18px rgba(35,134,54,0.38);
    }

    .btn-login:active { transform: scale(0.98); }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0.9rem;
      font-size: 0.74rem;
      color: #484f58;
      border-top: 1px solid #21262d;
      line-height: 1.8;
    }
  </style>
</head>

    <h1>RJSS Sistemas Integrados</h1>
    <p class="subtitle">Acesse sua conta</p>

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alerta">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" name="usuario"
               placeholder="Digite seu usuário"
               required autofocus autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha"
               placeholder="Digite sua senha"
               required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login">Entrar</button>
    </form>
  </div>
</div>
